name: Sync facility agents

on:
  schedule:
    - cron: '0 3 * * 1'  # Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Hokusai-Agent
        run: |
          git clone --depth=1 https://github.com/RIKEN-RCCS/Hokusai-Agent.git /tmp/hokusai-src
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.claude-plugin/' \
            /tmp/hokusai-src/ hokusai/

      - name: Sync Rikyu-Agent
        run: |
          git clone --depth=1 https://github.com/RIKEN-RCCS/Rikyu-Agent.git /tmp/rikyu-src
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.claude-plugin/' \
            /tmp/rikyu-src/ rikyu/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hokusai/ rikyu/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "sync: update Hokusai-Agent and Rikyu-Agent mirrors"
            git push
          fi
