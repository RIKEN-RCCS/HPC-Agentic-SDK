name: Sync facility agents

on:
  schedule:
    - cron: '0 3 * * 1'  # Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Hokusai-Agent
        run: |
          git clone --depth=1 https://github.com/RIKEN-RCCS/Hokusai-Agent.git /tmp/hokusai-src
          rsync -a --delete \
            --exclude='/.git/' \
            --exclude='/.claude-plugin/' \
            /tmp/hokusai-src/ hokusai/
          VER=$(grep '^version' hokusai/server/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" \
            hokusai/plugins/hokusai/.claude-plugin/plugin.json \
            hokusai/plugins/hokusai/.codex-plugin/plugin.json

      - name: Sync Rikyu-Agent
        run: |
          git clone --depth=1 https://github.com/RIKEN-RCCS/Rikyu-Agent.git /tmp/rikyu-src
          rsync -a --delete \
            --exclude='/.git/' \
            --exclude='/.claude-plugin/' \
            /tmp/rikyu-src/ rikyu/
          VER=$(grep '^version' rikyu/server/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" \
            rikyu/plugins/rikyu/.claude-plugin/plugin.json \
            rikyu/plugins/rikyu/.codex-plugin/plugin.json

      - name: Sync RCCS-CloudAgent
        run: |
          git clone --depth=1 https://github.com/william-dawson/RCCS-CloudAgent.git /tmp/rccs-src
          rsync -a --delete \
            --exclude='/.git/' \
            --exclude='/.claude-plugin/' \
            /tmp/rccs-src/ r-ccs-cloud/
          VER=$(grep '^version' r-ccs-cloud/server/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" \
            r-ccs-cloud/plugins/rccs-cloud/.claude-plugin/plugin.json \
            r-ccs-cloud/plugins/rccs-cloud/.codex-plugin/plugin.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hokusai/ rikyu/ r-ccs-cloud/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "sync: update Hokusai-Agent, Rikyu-Agent, and RCCS-CloudAgent mirrors"
            git push
          fi
